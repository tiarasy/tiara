<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ QUICK MATH · Hitung Cepat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 16px;
            margin: 0;
        }
        .game-panel {
            max-width: 580px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 48px;
            padding: 32px 24px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        }
        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 120px;
            padding: 12px 24px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 8px 0 #00000020;
        }
        .score-box, .timer-box {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: 0.5px;
        }
        .score-box span, .timer-box span {
            background: #0b1622;
            color: #fbbf24;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 2rem;
            font-weight: 700;
            min-width: 90px;
            text-align: center;
            box-shadow: inset 0 -3px 0 #0000005e, 0 4px 12px #00000060;
            border: 1px solid #fbbf2430;
        }
        .timer-box span {
            color: #7dd3fc;
            border-color: #7dd3fc40;
        }
        .icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 4px 2px #00000050);
        }
        .challenge-card {
            background: #1e2c3a;
            border-radius: 64px;
            padding: 30px 20px;
            margin-bottom: 32px;
            border: 2px solid #facc1550;
            box-shadow: 0 20px 0 #0f1a24, inset 0 -6px 0 #b68b1e30;
        }
        .equation {
            background: #0b141f;
            border-radius: 60px;
            padding: 20px 10px;
            text-align: center;
            font-size: 4.5rem;
            font-weight: 800;
            color: #fde68a;
            text-shadow: 0 5px 0 #a16207, 0 10px 15px #00000080;
            letter-spacing: 6px;
            border: 2px solid #fbbf24;
            box-shadow: inset 0 -8px 0 #00000060, 0 10px 10px black;
            word-break: break-word;
        }
        .operator-symbol {
            color: #f97316;
            font-size: 4rem;
            margin: 0 6px;
            text-shadow: 0 4px 0 #9a3412;
        }
        .input-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 24px 0 20px;
            gap: 18px;
        }
        .answer-input {
            width: 200px;
            font-size: 2.8rem;
            padding: 16px 20px;
            text-align: center;
            background: #020617;
            border: 3px solid #24a5fb;
            border-radius: 80px;
            color: white;
            font-weight: 700;
            outline: none;
            box-shadow: 0 10px 0 #0f172a, inset 0 2px 15px #000000;
            transition: 0.07s ease;
        }
        .answer-input:focus {
            border-color: #ffd966;
            transform: scale(1.02);
            background: #0f1c2f;
        }
        .answer-input::placeholder {
            color: #475569;
            font-size: 1.6rem;
            font-weight: 400;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin: 12px 0 18px;
        }
        .btn {
            background: #334155;
            border: none;
            border-bottom: 6px solid #1e293b;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 16px 32px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 7px 0 #0f172a;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex: 1 1 auto;
            min-width: 160px;
        }
        .btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }
        .btn-primary {
            background: #f59e0b;
            border-bottom-color: #09b48c;
            color: #0c0a2a;
            font-weight: 700;
            text-shadow: 0 1px 0 #ffdb7e;
        }
        .btn-warning {
            background: #334155;
            border-bottom-color: #1e293b;
        }
        .btn-danger {
            background: #b91c1c;
            border-bottom-color: #7f1d1d;
        }
        .feedback {
            font-size: 1.7rem;
            font-weight: 600;
            text-align: center;
            min-height: 3.5rem;
            padding: 8px 12px;
            border-radius: 60px;
            color: #FA8072;
            text-shadow: 0 2px 0 #92400e;
            background: #00000040;
            margin: 16px 0 8px;
        }
        .footer-small {
            color: #94a3b8;
            text-align: center;
            margin-top: 25px;
            font-size: 1rem;
            font-weight: 400;
            border-top: 1px dashed #fbbf2440;
            padding-top: 15px;
        }
        .footer-small strong {
            color: #56bd0c;
            font-weight: 600;
        }
        @media (max-width: 450px) {
            .equation { font-size: 3rem; letter-spacing: 3px; }
            .btn { font-size: 1.2rem; padding: 14px 18px; min-width: 130px; }
            .score-box span, .timer-box span { font-size: 1.5rem; min-width: 70px; }
        }
    </style>
</head>
<body>
    <div class="game-panel">
        <!-- skor dan timer -->
        <div class="header-stats">
            <div class="score-box">
                <span class="icon">🏆</span>
                <span id="scoreDisplay">0</span>
            </div>
            <div class="timer-box">
                <span class="icon">⏳</span>
                <span id="timerDisplay">30</span>
            </div>
        </div>

        <!-- area soal -->
        <div class="challenge-card">
            <div class="equation" id="soalText">7 + 3</div>
        </div>

        <!-- input & kontrol -->
        <div class="input-area">
            <input type="number" id="jawabanInput" class="answer-input" placeholder="?" value="" inputmode="numeric">
        </div>

        <!-- tombol aksi -->
        <div class="button-group">
            <button class="btn btn-primary" id="submitBtn">✅ CEK</button>
            <button class="btn btn-warning" id="resetBtn">🔄 RESET</button>
        </div>

        <!-- feedback area -->
        <div class="feedback" id="feedbackMsg">Masukkan angka & klik CEK</div>

        <!-- random logic & footer -->
        <div class="footer-small">
            ⚡ <strong>RANDOM SOAL</strong> · skor bertambah jika benar · waktu 30 detik
        </div>
    </div>

    <script>
        (function() {
            // ---------- state global ----------
            let skor = 0;
            let waktu = 30;               
            let timerAktif = false;        
            let intervalId = null;         

            // elemen DOM
            const soalEl = document.getElementById('soalText');
            const skorEl = document.getElementById('scoreDisplay');
            const timerEl = document.getElementById('timerDisplay');
            const jawabanInput = document.getElementById('jawabanInput');
            const submitBtn = document.getElementById('submitBtn');
            const resetBtn = document.getElementById('resetBtn');
            const feedbackEl = document.getElementById('feedbackMsg');

            let angka1 = 0;
            let angka2 = 0;
            let operator = '+';
            let jawabanBenar = 0;


            function getRandomInt(max = 20) {
                return Math.floor(Math.random() * (max + 1));  // 0..20
            }

            // ---------- membuat soal random (operator + - *) ----------
            function buatSoalBaru() {
                // random logic: pilih operator secara acak
                const ops = ['+', '-', '*'];
                const opRand = ops[Math.floor(Math.random() * ops.length)];

                let a, b, hasil;
                switch (opRand) {
                    case '+':
                        a = getRandomInt(18);     // 0-18
                        b = getRandomInt(18);     // 0-18
                        hasil = a + b;
                        break;
                    case '-':
                        
                        a = getRandomInt(18);      // 0-18
                        b = getRandomInt(a);       // 0..a   (dijamin a - b >= 0)
                        hasil = a - b;
                        break;
                    case '*':
                        // perkalian kecil: angka 0-8
                        a = getRandomInt(8);        // 0-8
                        b = getRandomInt(8);        // 0-8
                        hasil = a * b;
                        break;
                    default: // fallback
                        a = 5; b = 2; hasil = 7; opRand = '+';
                }

                // simpan state
                angka1 = a;
                angka2 = b;
                operator = opRand;
                jawabanBenar = hasil;

                // tampilkan soal
                soalEl.innerHTML = `${angka1} <span class="operator-symbol">${operator}</span> ${angka2}`;
            }

            // ---------- update tampilan skor & timer ----------
            function perbaruiUI() {
                skorEl.textContent = skor;
                timerEl.textContent = waktu;
            }

            // ---------- menampilkan feedback ----------
            function setFeedback(teks, isError = false, isSuccess = false) {
                feedbackEl.textContent = teks;
                if (isSuccess) {
                    feedbackEl.style.color = '#bef264'; // hijau terang
                } else if (isError) {
                    feedbackEl.style.color = '#fda4af'; // merah salmon
                } else {
                    feedbackEl.style.color = '#fde047'; // kuning normal
                }
            }

            // ---------- cek jawaban user ----------
            function cekJawaban() {
                // jika waktu habis, blokir
                if (waktu <= 0) {
                    setFeedback('⏰ WAKTU HABIS! Tekan RESET untuk main lagi', true);
                    jawabanInput.value = '';
                    return;
                }

                
                if (!timerAktif) {
                    mulaiTimer();
                }

                const inputVal = jawabanInput.value.trim();
                if (inputVal === '') {
                    setFeedback('✏️ Masukkan angka terlebih dahulu', true);
                    return;
                }
                const jawabanUser = Number(inputVal);
                if (isNaN(jawabanUser)) {
                    setFeedback('❌ Harus angka ya!', true);
                    jawabanInput.value = '';
                    return;
                }

                // bandingkan
                if (jawabanUser === jawabanBenar) {
                    // benar → tambah skor, buat soal baru
                    skor++;
                    perbaruiUI();
                    setFeedback(`✅ BENAR! +1 poin (${angka1} ${operator} ${angka2} = ${jawabanBenar})`, false, true);
                    buatSoalBaru();
                    jawabanInput.value = '';   // kosongkan input
                    jawabanInput.focus();
                } else {
                    // salah
                    setFeedback(`❌ SALAH! Coba lagi`, true);
                    jawabanInput.value = '';    // langsung hapus agar fokus isi baru
                    jawabanInput.focus();
                }
            }

            // ---------- reset permainan (skor 0, waktu 30, soal baru, timer dimulai) ----------
            function resetGame() {
                // hentikan timer lama jika ada
                if (intervalId) {
                    clearInterval(intervalId);
                    intervalId = null;
                    timerAktif = false;
                }

                // reset variabel
                skor = 0;
                waktu = 30;
                perbaruiUI();

                // buat soal baru
                buatSoalBaru();

                
                jawabanInput.value = '';
                setFeedback('🔄 Permainan baru! Waktu 30 detik', false);
                feedbackEl.style.color = '#fde047';

                // langsung mulai timer (biasa digunakan setelah reset)
                mulaiTimer();

                // fokus ke input
                jawabanInput.focus();
            }

            // ---------- fungsi timer (countdown) ----------
            function mulaiTimer() {
                // jika sudah ada interval berjalan, jangan duplikasi
                if (timerAktif) return;

                timerAktif = true;
                intervalId = setInterval(() => {
                    
                    if (waktu > 0) {
                        waktu--;
                        timerEl.textContent = waktu;

                        
                        if (waktu === 0) {
                            
                            clearInterval(intervalId);
                            intervalId = null;
                            timerAktif = false;
                            timerEl.textContent = '0';
                            setFeedback('⏰ GAME OVER — waktu habis!', true);
                            
                        }
                    } else {
                    
                        if (intervalId) {
                            clearInterval(intervalId);
                            intervalId = null;
                            timerAktif = false;
                        }
                    }
                }
            }

            // ---------- inisialisasi / first load ----------
            function initGame() {
                // buat soal random pertama
                buatSoalBaru();
                skor = 0;
                waktu = 30;
                perbaruiUI();
                setFeedback('🔢 Mulai! jawab secepat mungkin', false);
                jawabanInput.value = '';
                jawabanInput.focus();

                
                if (intervalId) {
                    clearInterval(intervalId);
                    intervalId = null;
                }
                timerAktif = false;
                mulaiTimer();
            }

            submitBtn.addEventListener('click', function() {
                cekJawaban();
            });


            jawabanInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    cekJawaban();
                }
            });

            resetBtn.addEventListener('click', function() {
                resetGame();
            });


            initGame();

            window.addEventListener('beforeunload', function() {
                if (intervalId) {
                    clearInterval(intervalId);
                }
            });
        })();
    </script>
</body>
</html>
